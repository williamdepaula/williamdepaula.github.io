    <script>
        function get_tutorial() {
            var url_atual = window.location.href;
            var link = 'tutoriais/' + url_atual.split('#')[1] + '.html';
            fetch(link)
                .then(res => {
                    if (res.status >= 400) {
                        html = '<h1>Pagina Não Encontrada</h1>';
                        return html;
                    }

                    return res.text();

                })
                .then(data => {
                    $('#tutorial').html(data);
                });
        }
        document.addEventListener("DOMContentLoaded", get_tutorial());

    </script>
